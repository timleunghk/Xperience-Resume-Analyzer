<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Xperience AI Resume Analysis</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        /* Simple fade-in animation */
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .animate-fade-in {
            animation: fadeIn 0.5s ease-out forwards;
        }
    </style>
</head>
<body class="min-h-screen bg-slate-50 py-12 px-4 sm:px-6 lg:px-8 font-sans text-slate-900">

    <div class="max-w-4xl mx-auto">
        <!-- Header -->
        <div class="text-center mb-10">
            <h1 class="text-4xl font-extrabold tracking-tight text-slate-900 mb-3">
                Xperience AI Resume Analysis
            </h1>
            <p class="text-lg text-slate-600">
                Upload a CV and Job Description to get an in-depth AI matching evaluation.
            </p>
        </div>

        <!-- Form Card -->
        <div class="bg-white rounded-2xl shadow-sm border border-slate-200 overflow-hidden">
            <form id="analysisForm" class="p-8">
                <div class="grid md:grid-cols-2 gap-8 mb-8">
                    <!-- CV Upload -->
                    <div>
                        <label class="block text-sm font-semibold text-slate-700 mb-2">
                            Upload CV (PDF/DOCX/ZIP)
                        </label>
                        <div class="relative border-2 border-dashed border-slate-300 rounded-xl p-6 hover:border-blue-500 transition-colors bg-slate-50 group text-center cursor-pointer">
                            <input type="file" id="cvFile" class="absolute inset-0 w-full h-full opacity-0 cursor-pointer" accept=".pdf,.doc,.docx,.zip" />
                            <i data-lucide="upload-cloud" class="mx-auto h-10 w-10 text-slate-400 group-hover:text-blue-500 mb-3 transition-colors"></i>
                            <p id="cvFileName" class="text-sm text-slate-600 font-medium">Click or drag file here</p>
                        </div>
                    </div>

                    <!-- JD Upload -->
                    <div>
                        <label class="block text-sm font-semibold text-slate-700 mb-2">
                            Upload Job Description (PDF/DOCX)
                        </label>
                        <div class="relative border-2 border-dashed border-slate-300 rounded-xl p-6 hover:border-blue-500 transition-colors bg-slate-50 group text-center cursor-pointer">
                            <input type="file" id="jdFile" class="absolute inset-0 w-full h-full opacity-0 cursor-pointer" accept=".pdf,.doc,.docx" />
                            <i data-lucide="file-text" class="mx-auto h-10 w-10 text-slate-400 group-hover:text-blue-500 mb-3 transition-colors"></i>
                            <p id="jdFileName" class="text-sm text-slate-600 font-medium">Click or drag file here</p>
                        </div>
                    </div>
                </div>

                <!-- Mode Selection -->
                <div class="mb-8">
                    <label class="block text-sm font-semibold text-slate-700 mb-3">Select Analysis Mode</label>
                    <div class="flex gap-4">
                        <label id="labelJobSeeker" class="flex-1 flex items-center justify-center p-4 rounded-xl border-2 cursor-pointer transition-all border-blue-600 bg-blue-50 text-blue-700">
                            <input type="radio" name="mode" value="Job Seeker" checked class="hidden" onchange="updateModeUI()" />
                            <i data-lucide="user" class="mr-2 h-5 w-5"></i>
                            <span class="font-medium">Job Seeker</span>
                        </label>
                        <label id="labelEmployer" class="flex-1 flex items-center justify-center p-4 rounded-xl border-2 cursor-pointer transition-all border-slate-200 hover:border-slate-300 text-slate-600">
                            <input type="radio" name="mode" value="Employer" class="hidden" onchange="updateModeUI()" />
                            <i data-lucide="briefcase" class="mr-2 h-5 w-5"></i>
                            <span class="font-medium">Employer</span>
                        </label>
                    </div>
                </div>

                <!-- Error Message -->
                <div id="errorBox" class="hidden mb-6 p-4 bg-red-50 text-red-700 rounded-lg border border-red-200 flex items-center gap-2">
                    <i data-lucide="alert-triangle" class="h-5 w-5"></i>
                    <span id="errorMessage"></span>
                </div>

                <!-- Submit Button -->
                <button type="submit" id="submitBtn" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-4 px-8 rounded-xl transition-colors flex items-center justify-center text-lg shadow-sm disabled:opacity-70 disabled:cursor-not-allowed">
                    <i data-lucide="loader-2" id="loadingIcon" class="hidden animate-spin mr-2 h-5 w-5"></i>
                    <span id="btnText">Start Analysis</span>
                </button>
            </form>
        </div>

        <!-- Results Section (Hidden by default) -->
        <div id="resultSection" class="hidden bg-white rounded-2xl shadow-xl p-8 mt-8 border border-gray-100 animate-fade-in">
            <div class="flex flex-col md:flex-row justify-between items-start md:items-center mb-8 gap-4">
                <div>
                    <h2 class="text-2xl font-bold text-gray-800">Analysis Report</h2>
                    <p class="text-gray-500 flex items-center gap-2 mt-1">
                        <i data-lucide="user" class="h-4 w-4"></i> <span id="resName">Unknown</span>
                    </p>
                </div>
                <div class="flex items-center gap-4 bg-blue-50 px-6 py-3 rounded-xl border border-blue-100">
                    <div class="text-center">
                        <p class="text-sm text-blue-600 font-medium mb-1">Match Score</p>
                        <p class="text-3xl font-black text-blue-700"><span id="resScore">0</span>%</p>
                    </div>
                    <div class="h-10 w-px bg-blue-200 mx-2"></div>
                    <div class="text-center">
                        <p class="text-sm text-blue-600 font-medium mb-1">Status</p>
                        <p id="resStatus" class="text-lg font-bold text-blue-800">-</p>
                    </div>
                </div>
            </div>

            <div class="mb-8 bg-gray-50 p-5 rounded-xl border border-gray-100">
                <h3 class="text-lg font-semibold text-gray-800 mb-2">Executive Summary</h3>
                <p id="resSummary" class="text-gray-700 leading-relaxed"></p>
            </div>

            <div class="grid md:grid-cols-2 gap-6">
                <!-- Strengths -->
                <div class="bg-green-50/50 p-6 rounded-xl border border-green-100">
                    <h3 class="text-lg font-semibold text-green-800 mb-4 flex items-center gap-2">
                        <i data-lucide="check-circle" class="text-green-600 h-5 w-5"></i>
                        Key Strengths
                    </h3>
                    <ul id="resStrengths" class="space-y-3"></ul>
                </div>

                <!-- Missing -->
                <div class="bg-red-50/50 p-6 rounded-xl border border-red-100">
                    <h3 class="text-lg font-semibold text-red-800 mb-4 flex items-center gap-2">
                        <i data-lucide="alert-triangle" class="text-red-600 h-5 w-5"></i>
                        Missing Qualifications
                    </h3>
                    <ul id="resMissing" class="space-y-3"></ul>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Initialize Lucide Icons
        lucide.createIcons();

        // Constants
        const WEBHOOK_URL = 'http://localhost:5678/webhook/xperience'; // REPLACE THIS

        // Elements
        const cvFileInput = document.getElementById('cvFile');
        const jdFileInput = document.getElementById('jdFile');
        const cvFileName = document.getElementById('cvFileName');
        const jdFileName = document.getElementById('jdFileName');
        const form = document.getElementById('analysisForm');
        const submitBtn = document.getElementById('submitBtn');
        const btnText = document.getElementById('btnText');
        const loadingIcon = document.getElementById('loadingIcon');
        const errorBox = document.getElementById('errorBox');
        const errorMessage = document.getElementById('errorMessage');
        const resultSection = document.getElementById('resultSection');

        // File Input Listeners
        cvFileInput.addEventListener('change', (e) => {
            cvFileName.textContent = e.target.files[0] ? e.target.files[0].name : 'Click or drag file here';
        });

        jdFileInput.addEventListener('change', (e) => {
            jdFileName.textContent = e.target.files[0] ? e.target.files[0].name : 'Click or drag file here';
        });

        // Mode Selection UI Update
        function updateModeUI() {
            const mode = document.querySelector('input[name="mode"]:checked').value;
            const labelJobSeeker = document.getElementById('labelJobSeeker');
            const labelEmployer = document.getElementById('labelEmployer');

            if (mode === 'Job Seeker') {
                labelJobSeeker.className = "flex-1 flex items-center justify-center p-4 rounded-xl border-2 cursor-pointer transition-all border-blue-600 bg-blue-50 text-blue-700";
                labelEmployer.className = "flex-1 flex items-center justify-center p-4 rounded-xl border-2 cursor-pointer transition-all border-slate-200 hover:border-slate-300 text-slate-600";
            } else {
                labelEmployer.className = "flex-1 flex items-center justify-center p-4 rounded-xl border-2 cursor-pointer transition-all border-blue-600 bg-blue-50 text-blue-700";
                labelJobSeeker.className = "flex-1 flex items-center justify-center p-4 rounded-xl border-2 cursor-pointer transition-all border-slate-200 hover:border-slate-300 text-slate-600";
            }
        }

        // Form Submission
        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const cvFile = cvFileInput.files[0];
            const jdFile = jdFileInput.files[0];
            const mode = document.querySelector('input[name="mode"]:checked').value;

            if (!cvFile || !jdFile) {
                showError('Please upload both CV and Job Description files.');
                return;
            }

            // Set Loading State
            errorBox.classList.add('hidden');
            resultSection.classList.add('hidden');
            submitBtn.disabled = true;
            btnText.textContent = 'Analyzing, please wait...';
            loadingIcon.classList.remove('hidden');

            const formData = new FormData();
            formData.append('cv_post_file', cvFile);
            formData.append('jd_post_file', jdFile);
            formData.append('Mode', mode);

            try {
                const response = await fetch(WEBHOOK_URL, {
                    method: 'POST',
                    body: formData,
                });

                if (!response.ok) throw new Error(`Server error: ${response.status}`);

                const data = await response.json();
                const resultData = Array.isArray(data) ? data[0] : data;
                
                renderResults(resultData);
            } catch (err) {
                console.error(err);
                showError('Error connecting to the API. Please ensure the Webhook URL is correct and CORS is allowed.');
            } finally {
                // Reset Loading State
                submitBtn.disabled = false;
                btnText.textContent = 'Start Analysis';
                loadingIcon.classList.add('hidden');
            }
        });

        function showError(msg) {
            errorMessage.textContent = msg;
            errorBox.classList.remove('hidden');
        }

        function renderResults(result) {
            // Extract data handling n8n typos
            const name = result['Candidate Name'] || 'Unknown';
            const score = result['Match Percentage'] || 0;
            const strengths = result['Key Strengths'] || result['Key Strenghts'] || [];
            const missing = result['Missing Qualifications'] || result['Missing Keywords'] || [];
            const summary = result['Executive Summary'] || result['Actionable Feedback'] || '';
            const status = result['Recommendation'] || result['Readliness Level'] || '';

            // Populate DOM
            document.getElementById('resName').textContent = name;
            document.getElementById('resScore').textContent = score;
            document.getElementById('resStatus').textContent = status;
            document.getElementById('resSummary').textContent = summary;

            // Render Lists
            const strengthsList = document.getElementById('resStrengths');
            strengthsList.innerHTML = '';
            if (Array.isArray(strengths) && strengths.length > 0) {
                strengths.forEach(item => {
                    strengthsList.innerHTML += `<li class="flex items-start gap-2 text-green-900">
                        <i data-lucide="chevron-right" class="text-green-500 shrink-0 mt-0.5 h-5 w-5"></i>
                        <span>${item}</span>
                    </li>`;
                });
            } else {
                strengthsList.innerHTML = '<li class="text-green-700 italic">No obvious strengths found</li>';
            }

            const missingList = document.getElementById('resMissing');
            missingList.innerHTML = '';
            if (Array.isArray(missing) && missing.length > 0) {
                missing.forEach(item => {
                    missingList.innerHTML += `<li class="flex items-start gap-2 text-red-900">
                        <i data-lucide="chevron-right" class="text-red-500 shrink-0 mt-0.5 h-5 w-5"></i>
                        <span>${item}</span>
                    </li>`;
                });
            } else {
                missingList.innerHTML = '<li class="text-red-700 italic">No obvious missing qualifications</li>';
            }

            // Re-initialize icons for newly added HTML
            lucide.createIcons();

            // Show Results
            resultSection.classList.remove('hidden');
        }
    </script>
</body>
</html>
